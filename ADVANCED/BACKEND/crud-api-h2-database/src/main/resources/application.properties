spring.application.name=crud-api-h2-database
server.port=8080

# H2 in-memory database — no installation required
spring.datasource.url=jdbc:h2:mem:taskdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Enable H2 web console: visit http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:taskdb  Username: sa  Password: (blank)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop
